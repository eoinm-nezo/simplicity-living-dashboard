<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration Analysis - Energy Consumption</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
        }
        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <canvas id="energyConfigChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('energyConfigChart').getContext('2d');
        
        // Configuration comparison data
        const configurations = [
            'Baseline\n(Standard)',
            'Enhanced\nInsulation',
            'High Performance\nGlazing',
            'Passive Design\n+ Thermal Mass',
            'Simplicity\nMethod',
            'Premium\nSystems'
        ];
        
        const heatingEnergy = [85, 72, 68, 55, 48, 45];
        const coolingEnergy = [42, 38, 32, 28, 25, 24];
        const lightingEnergy = [28, 25, 22, 20, 18, 17];
        const equipmentEnergy = [35, 35, 35, 33, 30, 29];
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: configurations,
                datasets: [
                    {
                        label: 'Heating',
                        data: heatingEnergy,
                        backgroundColor: '#ff6600',
                        borderColor: '#cc5200',
                        borderWidth: 1
                    },
                    {
                        label: 'Cooling',
                        data: coolingEnergy,
                        backgroundColor: '#4CAF50',
                        borderColor: '#388E3C',
                        borderWidth: 1
                    },
                    {
                        label: 'Lighting',
                        data: lightingEnergy,
                        backgroundColor: '#FFC107',
                        borderColor: '#FFA000',
                        borderWidth: 1
                    },
                    {
                        label: 'Equipment',
                        data: equipmentEnergy,
                        backgroundColor: '#2196F3',
                        borderColor: '#1976D2',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Energy Consumption by Configuration',
                        font: {
                            size: 18,
                            weight: 'bold'
                        },
                        color: '#333'
                    },
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: {
                                size: 12
                            }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            footer: function(tooltipItems) {
                                let sum = 0;
                                tooltipItems.forEach(function(tooltipItem) {
                                    sum += tooltipItem.parsed.y;
                                });
                                return 'Total: ' + sum + ' kWh/m²/year';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        stacked: true,
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: {
                                size: 11
                            }
                        }
                    },
                    y: {
                        stacked: true,
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Energy Use Intensity (kWh/m²/year)',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        },
                        grid: {
                            color: '#e0e0e0'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
