<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auckland Sustainable Transport — Simplicity Living</title>
<style>
    :root { --orange:#ff6600; --rail:#1a73e8; --bus:#e37400; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Roboto,Arial,sans-serif; background:#f5f0e8; }

    /* ── Google Maps-style top chrome ── */
    .gm-chrome {
        background:#fff;
        border-bottom:1px solid #e0ddd8;
        padding:0.55rem 1rem;
        display:flex;
        align-items:center;
        justify-content:space-between;
        box-shadow:0 1px 4px rgba(0,0,0,.12);
        position:relative; z-index:2;
    }
    .gm-title  { font-size:1rem; font-weight:500; color:#202124; }
    .gm-sub    { font-size:0.78rem; color:#70757a; margin-top:1px; }

    /* compass */
    .gm-compass { width:30px; height:30px; }

    /* ── Legend strip ── */
    .gm-legend {
        background:#fff;
        border-bottom:1px solid #e0ddd8;
        padding:0.4rem 1rem;
        display:flex;
        flex-wrap:wrap;
        gap:0.4rem 1.1rem;
        font-size:0.77rem;
        color:#3c4043;
        box-shadow:0 1px 2px rgba(0,0,0,.06);
    }
    .leg { display:inline-flex; align-items:center; gap:0.35rem; }
    .leg-rail { width:22px; height:4px; background:var(--rail); border-radius:2px; }
    .leg-bus  { width:22px; height:4px; background:var(--bus);  border-radius:2px; }
    .leg-stop { width:10px; height:10px; border-radius:50%; background:#fff; border:2.5px solid var(--rail); flex-shrink:0; }
    .leg-pin  {
        width:10px; height:13px; flex-shrink:0;
        background:var(--orange); border-radius:50% 50% 50% 0;
        transform:rotate(-45deg); position:relative; top:-1px;
    }
    .leg-pin::after {
        content:''; position:absolute;
        top:50%; left:50%;
        transform:translate(-50%,-50%);
        width:5px; height:5px;
        background:#fff; border-radius:50%;
    }

    .map-wrap { line-height:0; }
    svg { width:100%; height:auto; display:block; max-height:73vh; }
</style>
</head>
